<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Count & Circle — Fun Counting Worksheet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --pink: #F472B6;
    --blue: #60A5FA;
    --green: #34D399;
    --orange: #FB923C;
    --purple: #A78BFA;
    --yellow: #FBBF24;
    --gray-light: #F3F4F6;
    --gray-border: #D1D5DB;
    --text: #1F2937;
  }

  html, body {
    font-family: 'Fredoka', sans-serif;
    color: var(--text);
    background: white;
  }

  @page {
    size: A4 portrait;
    margin: 12mm;
  }

  .sheet {
    width: 190mm;
    max-width: 100%;
    margin: 0 auto;
    padding: 6mm 0;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 5mm;
  }

  .header h1 {
    font-size: 28pt;
    font-weight: 700;
    color: var(--purple);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .header p {
    font-size: 11pt;
    color: #6B7280;
    margin-top: 2mm;
    font-weight: 400;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4mm;
    margin-top: 4mm;
  }

  /* ── Puzzle Card ── */
  .card {
    border: 2.5px solid var(--gray-border);
    border-radius: 10px;
    padding: 4mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    page-break-inside: avoid;
  }

  .card:nth-child(1) { border-color: var(--pink); }
  .card:nth-child(2) { border-color: var(--blue); }
  .card:nth-child(3) { border-color: var(--green); }
  .card:nth-child(4) { border-color: var(--orange); }
  .card:nth-child(5) { border-color: var(--purple); }
  .card:nth-child(6) { border-color: var(--yellow); }

  .card-label {
    font-size: 9pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2mm;
  }

  .card:nth-child(1) .card-label { color: var(--pink); }
  .card:nth-child(2) .card-label { color: var(--blue); }
  .card:nth-child(3) .card-label { color: var(--green); }
  .card:nth-child(4) .card-label { color: var(--orange); }
  .card:nth-child(5) .card-label { color: var(--purple); }
  .card:nth-child(6) .card-label { color: var(--yellow); }

  /* Icon area */
  .icons {
    width: 100%;
    min-height: 28mm;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 2.5mm;
    padding: 2mm 1mm;
  }

  .icons span {
    font-size: 22pt;
    line-height: 1;
  }

  /* Answer choices */
  .choices {
    display: flex;
    gap: 3mm;
    margin-top: auto;
    padding-top: 3mm;
  }

  .choice {
    width: 12mm;
    height: 12mm;
    border: 2px solid var(--gray-border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14pt;
    font-weight: 700;
    color: var(--text);
    background: white;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 5mm;
    font-size: 8pt;
    color: #9CA3AF;
  }

  /* ── Print tweaks ── */
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    .sheet { padding: 0; }

    .card {
      border-width: 2.5px !important;
    }

    .choice {
      border-width: 2px !important;
    }
  }

  /* ── Screen-only preview polish ── */
  @media screen {
    body {
      background: #F9FAFB;
      padding: 20px;
    }
    .sheet {
      background: white;
      padding: 20mm 14mm;
      box-shadow: 0 1px 6px rgba(0,0,0,.08);
      border-radius: 6px;
    }
  }
</style>
</head>
<body>

<div class="sheet">
  <div class="header">
    <h1>Count & Circle!</h1>
    <p>Count the pictures in each box, then circle the right number.</p>
  </div>

  <div class="grid">

    <!-- 1 — Cars → 5 -->
    <div class="card">
      <div class="card-label">Cars</div>
      <div class="icons">
        <span>🚗</span><span>🚗</span><span>🚗</span>
        <span>🚗</span><span>🚗</span>
      </div>
      <div class="choices">
        <div class="choice">3</div>
        <div class="choice">5</div>
        <div class="choice">7</div>
      </div>
    </div>

    <!-- 2 — Rockets → 3 -->
    <div class="card">
      <div class="card-label">Rockets</div>
      <div class="icons">
        <span>🚀</span><span>🚀</span><span>🚀</span>
      </div>
      <div class="choices">
        <div class="choice">2</div>
        <div class="choice">3</div>
        <div class="choice">5</div>
      </div>
    </div>

    <!-- 3 — Dinosaurs → 7 -->
    <div class="card">
      <div class="card-label">Dinosaurs</div>
      <div class="icons">
        <span>🦕</span><span>🦕</span><span>🦕</span><span>🦕</span>
        <span>🦕</span><span>🦕</span><span>🦕</span>
      </div>
      <div class="choices">
        <div class="choice">6</div>
        <div class="choice">7</div>
        <div class="choice">9</div>
      </div>
    </div>

    <!-- 4 — Robots → 4 -->
    <div class="card">
      <div class="card-label">Robots</div>
      <div class="icons">
        <span>🤖</span><span>🤖</span>
        <span>🤖</span><span>🤖</span>
      </div>
      <div class="choices">
        <div class="choice">2</div>
        <div class="choice">4</div>
        <div class="choice">6</div>
      </div>
    </div>

    <!-- 5 — Superheroes → 8 -->
    <div class="card">
      <div class="card-label">Heroes</div>
      <div class="icons">
        <span>🦸</span><span>🦸</span><span>🦸</span><span>🦸</span>
        <span>🦸</span><span>🦸</span><span>🦸</span><span>🦸</span>
      </div>
      <div class="choices">
        <div class="choice">6</div>
        <div class="choice">8</div>
        <div class="choice">9</div>
      </div>
    </div>

    <!-- 6 — Trucks → 2 -->
    <div class="card">
      <div class="card-label">Trucks</div>
      <div class="icons">
        <span>🚒</span><span>🚒</span>
      </div>
      <div class="choices">
        <div class="choice">1</div>
        <div class="choice">2</div>
        <div class="choice">4</div>
      </div>
    </div>

  </div>

  <div class="footer">Name: ______________________________&nbsp;&nbsp;&nbsp;&nbsp;Date: ______________</div>
</div>

</body>
</html>
