<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Count the Toys Worksheet</title>
  <link rel="stylesheet" href="count-the-toys.css">
</head>
<body>
  <svg class="sprite-sheet" aria-hidden="true" focusable="false">
    <symbol id="icon-car" viewBox="0 0 120 70">
      <path d="M20 46h10l10-16h34l12 16h14c8 0 12 4 12 12v4H8v-6c0-6 4-10 12-10z" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M44 30l8-12h20l10 12" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="34" cy="58" r="9" fill="none" stroke="currentColor" stroke-width="4"/>
      <circle cx="88" cy="58" r="9" fill="none" stroke="currentColor" stroke-width="4"/>
      <path d="M54 22v8M72 22v8" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    </symbol>

    <symbol id="icon-figure" viewBox="0 0 90 110">
      <circle cx="45" cy="18" r="12" fill="none" stroke="currentColor" stroke-width="4"/>
      <path d="M45 31v28" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
      <path d="M25 45l20 8 20-8" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M31 72l14-13 14 13" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M31 72v18M59 72v18" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
      <path d="M23 92h16M51 92h16" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    </symbol>
  </svg>

  <main class="page">
    <header class="worksheet-header">
      <div class="top-line">
        <div class="line-field"><span>Name</span><span class="line"></span></div>
        <div class="line-field small"><span>Date</span><span class="line"></span></div>
      </div>

      <h1>Count the Toys</h1>
      <p>Count each set. Then circle the number that matches.</p>
    </header>

    <section class="puzzles" aria-label="Counting puzzles">
      <article class="card">
        <div class="card-label">How many cars?</div>
        <div class="items items-cars">
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
        </div>
        <div class="choices" aria-label="Choices: 3, 4, 6">
          <span class="choice">3</span>
          <span class="choice">4</span>
          <span class="choice">6</span>
        </div>
      </article>

      <article class="card">
        <div class="card-label">How many figures?</div>
        <div class="items items-figures">
          <svg class="icon icon-figure"><use href="#icon-figure"></use></svg>
          <svg class="icon icon-figure"><use href="#icon-figure"></use></svg>
        </div>
        <div class="choices" aria-label="Choices: 1, 2, 5">
          <span class="choice">1</span>
          <span class="choice">2</span>
          <span class="choice">5</span>
        </div>
      </article>

      <article class="card">
        <div class="card-label">How many cars?</div>
        <div class="items items-cars">
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
        </div>
        <div class="choices" aria-label="Choices: 4, 5, 7">
          <span class="choice">4</span>
          <span class="choice">5</span>
          <span class="choice">7</span>
        </div>
      </article>

      <article class="card">
        <div class="card-label">How many figures?</div>
        <div class="items items-figures">
          <svg class="icon icon-figure"><use href="#icon-figure"></use></svg>
          <svg class="icon icon-figure"><use href="#icon-figure"></use></svg>
          <svg class="icon icon-figure"><use href="#icon-figure"></use></svg>
        </div>
        <div class="choices" aria-label="Choices: 2, 3, 6">
          <span class="choice">2</span>
          <span class="choice">3</span>
          <span class="choice">6</span>
        </div>
      </article>

      <article class="card">
        <div class="card-label">How many cars?</div>
        <div class="items items-cars">
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
          <svg class="icon icon-car"><use href="#icon-car"></use></svg>
        </div>
        <div class="choices" aria-label="Choices: 5, 6, 8">
          <span class="choice">5</span>
          <span class="choice">6</span>
          <span class="choice">8</span>
        </div>
      </article>

      <article class="card">
        <div class="card-label">How many figures?</div>
        <div class="items items-figures one-item">
          <svg class="icon icon-figure"><use href="#icon-figure"></use></svg>
        </div>
        <div class="choices" aria-label="Choices: 0, 1, 4">
          <span class="choice">0</span>
          <span class="choice">1</span>
          <span class="choice">4</span>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
